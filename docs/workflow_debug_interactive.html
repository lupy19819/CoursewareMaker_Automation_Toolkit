<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CoursewareMaker 交互式流程图</title>
  <style>
    :root {
      --bg: #f5f7fa;
      --surface: #ffffff;
      --ink: #172033;
      --muted: #657184;
      --line: #b9c5d3;
      --blue: #1769aa;
      --blue-soft: #e6f1fb;
      --green: #1f7a53;
      --green-soft: #e8f6ef;
      --amber: #a05d00;
      --amber-soft: #fff4dc;
      --red: #b3261e;
      --red-soft: #fdebea;
      --shadow: 0 14px 38px rgba(23, 32, 51, .12);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid #d7dee8;
      padding: 16px 22px;
    }

    h1 {
      margin: 0 0 6px;
      font-size: 22px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 390px;
      gap: 16px;
      padding: 16px;
      max-width: 1580px;
      margin: 0 auto;
    }

    .toolbar {
      grid-column: 1 / -1;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      background: var(--surface);
    }

    .filter {
      min-height: 34px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
    }

    .filter.active {
      background: var(--blue);
      border-color: var(--blue);
      color: #fff;
    }

    .chart-wrap {
      overflow: auto;
      min-height: 760px;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    svg {
      display: block;
      min-width: 1180px;
      width: 100%;
      height: auto;
    }

    .flow-edge {
      fill: none;
      stroke: var(--line);
      stroke-width: 2.2;
      marker-end: url(#arrow);
    }

    .flow-edge.warn {
      stroke: var(--amber);
      stroke-dasharray: 7 6;
    }

    .flow-edge.success {
      stroke: var(--green);
    }

    .flow-node {
      cursor: pointer;
      transition: opacity .15s ease;
    }

    .flow-node rect,
    .flow-node polygon {
      fill: #fff;
      stroke: var(--line);
      stroke-width: 1.8;
      transition: fill .15s ease, stroke .15s ease, filter .15s ease;
    }

    .flow-node text {
      pointer-events: none;
      fill: var(--ink);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .flow-node .small {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 500;
    }

    .flow-node:hover rect,
    .flow-node:hover polygon,
    .flow-node.active rect,
    .flow-node.active polygon {
      fill: var(--blue-soft);
      stroke: var(--blue);
      filter: drop-shadow(0 6px 12px rgba(23, 105, 170, .18));
    }

    .flow-node.kind-route rect,
    .flow-node.kind-route polygon { fill: #fbfcfe; }
    .flow-node.kind-warn rect { fill: var(--amber-soft); stroke: #d4932b; }
    .flow-node.kind-ok rect { fill: var(--green-soft); stroke: #4a9a73; }
    .flow-node.kind-danger rect { fill: var(--red-soft); stroke: #d46b65; }

    .flow-node.hidden {
      opacity: .13;
    }

    .flow-label {
      fill: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .edge-label {
      fill: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    aside {
      position: sticky;
      top: 92px;
      align-self: start;
      max-height: calc(100vh - 110px);
      overflow: auto;
      border: 1px solid #d7dee8;
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .detail {
      padding: 18px;
    }

    .detail h2 {
      margin: 0 0 6px;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .tagline {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .section {
      margin-top: 14px;
      padding-top: 13px;
      border-top: 1px solid #d7dee8;
    }

    .section h3 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin: 6px 0;
      font-size: 13px;
      line-height: 1.5;
    }

    code {
      padding: 1px 5px;
      border: 1px solid #d8e0ea;
      border-radius: 5px;
      background: #f2f5f8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .quick-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .quick-links a {
      padding: 6px 10px;
      border: 1px solid #d7dee8;
      border-radius: 999px;
      color: var(--blue);
      text-decoration: none;
      font-size: 12px;
      background: #fbfcfe;
    }

    @media (max-width: 1100px) {
      main { grid-template-columns: 1fr; }
      aside { position: static; max-height: none; }
    }
  </style>
</head>

  <script>
    const DETAILS = {
      intake: {
        title: "1 任务输入 / 意图判定",
        summary: "先把用户原话交给 workflow_router.py 和 workflow_planner.py，由确定性规则判断环节、目标和游戏类型。AI 不直接决定新建、导入、返修或发布。",
        rules: [
          "固定入口：python3 workflow/workflow_router.py -m \"<用户消息>\" --pretty。",
          "任务单入口：python3 workflow/workflow_router.py -m \"<用户消息>\" | python3 workflow/workflow_planner.py --pretty。",
          "动作守卫：planner 输出 ready 后，关键动作还要经过 workflow_guard.py 检查。",
          "planner 返回 status=blocked 时必须停止补问，AI 不能绕过阻塞继续执行。",
          "新制作任务必须先锁定题目/配置输入文件和游戏类型；只说“生成某游戏配置”时 planner 必须 blocked。",
          "先判定意图，再判定游戏类型；反馈/返修类话术不能触发新建游戏。",
          "返修信号：不对、错了、资源用错、位置不好、改一下、调整、反馈、预览看到、刚才那个、这个游戏。命中后进入配置返修。",
          "给出 game_id 或具体游戏名，并要求上传/导入/保存/试一下时，进入导入保存到已有游戏，禁止新建。",
          "目标游戏解析：game_id 优先；没有 game_id 时按游戏名精确查询；同名或多结果必须确认，不能选最新或第一个。",
          "解析目标游戏后要回读并核对 game_id、game_name、game_type、编辑器入口和配置根结构。",
          "检查/对比/为什么/差异/看下问题属于排查校验；打开监听浏览器属于操作采集；预览/发布属于交付环节。",
          "只有明确说新建、创建一个新的、生成一个新的游戏、名字叫...，才进入新建游戏。",
          "意图不明确时先确认是修改已有游戏还是新建，不能用 latest_game_id.txt 猜。",
          "游戏类型只分三大类：运动PK、模板游戏、标准组件化题。",
          "运动PK关键字：赛跑、游泳、赛车。",
          "模板游戏关键字：贪吃小怪兽、阅读小帆船、阅读小火车、公路大冒险、单词拼拼乐、魔法拼拼乐、过桥大冒险、开心游乐园。",
          "标准组件化题关键字：标准组件化。",
          "确认输入是 Excel、JSON、题目列表，还是已有配置文件。",
          "确认素材是否已有平台 URL；只有本地文件名不足以生成可用配置。"
        ],
        scripts: [["workflow/workflow_router.py", "确定性路由"], ["workflow/workflow_planner.py", "生成任务单或 blocked 原因"], ["workflow/workflow_guard.py", "动作越权拦截"], ["workflow/intent_rules.json", "意图规则"], ["workflow/game_type_rules.json", "游戏类型规则"]],
        faults: ["玩法没确认会导致 baseline 和保存入口全链路错。", "把返修反馈误判为新任务，会错误新建游戏。"]
      },
      route: {
        title: "1 Planner / 任务计划",
        summary: "读取 router 输出，生成确定性任务单；缺 game_id、配置路径、输入文件、反馈范围或游戏类型时返回 blocked。",

        summary: "标准组件化实际题型之一，按 drag baseline 校验。",
        rules: ["根结构是 game。", "校验拖拽物、放置框、题干 label 和背景。", "拖拽物和放置框资源必须来自对应皮肤 expected_config。"],
        params: ["目的：标准拖拽题要求拖拽物、放置框、题干和背景资源全部匹配同一皮肤 baseline。", "任务清单锁定：gameplay_type=standard_drag，skin_key=具体皮肤，baseline=validation_baselines 对应项。", "生成脚本来源：standard_question_toolkit/scripts/generate_*.py；脚本负责生成拖拽物、放置框、答案关系和题干组件。", "校验入口：node scripts/validate_config.js --file <config.json>。", "validate_config.js 工作方式：检查 drag_item 和 drag_place 的状态资源集合是否属于 expected_config.component_assets；同时检查背景、题干 label、互斥组件。", "资源要求：拖拽物和放置框不能跨皮肤混用；否则运行时视觉和交互态会不一致。", "输出要求：根结构为 game，不得混入运动PK custom_game。"],
        scripts: [["standard_question_toolkit/data/courseware_workflow_rules.json", "standard_drag baseline"], ["scripts/validate_config.js", "校验"]],
        faults: ["拖拽物和放置框皮肤不一致会导致交互态异常。"]
      },
      preview: {
        title: "10 生成预览链接",
        summary: "回读比对通过后生成预览链接，用于人工验收。",
        rules: ["使用正确 game_id。", "预览链接通常 7 天有效。", "批量任务可用 batch 脚本统一生成。"],
        scripts: [["scripts/generate_share_link.js", "单个预览"], ["scripts/batch_generate_share_links.js", "批量预览"]],
        faults: ["game_id 错会生成非目标游戏链接。"]
      },
      publish: {
        title: "11 发布",
        summary: "确认预览无误后执行发布 API 链路。",
        rules: [
          "发布包含 gamePublish、gameDesc、build_queue、unlock 四步。",
          "unlock 必须 POST，不能 PUT。",
          "年份、学期、年级、学科、讲次要与交付要求一致。"
        ],
        scripts: [["scripts/publish_game_auto.js", "发布脚本"], ["docs/game_publish_workflow_analysis.md", "发布分析"]],
        faults: ["unlock 用 PUT 会 404。"]
      },
      faults: {
        title: "故障速查",
        summary: "从现象反查环节。",
        rules: [
          "运动PK导入后打不开：查 game_type=2、customEditor、custom_game。",
          "游戏名字重复：查是否误用 POST 更新已有游戏。",
          "API 成功但页面没变化：查 openType=1、回读比对、payload 根结构。",
          "配置双重编码：查 configuration 是否是字符串。",
          "组件遮挡/点击不到：查 components[] 顺序。",
          "发布失败：查 unlock 是否 POST。"
        ],
        scripts: [["docs/WORKFLOW_DEBUG_FLOWCHART.md", "文字版总图"], ["WORKFLOW.md", "运动PK修复记录"]],
        faults: ["先定位现象对应阶段，再看该阶段的输入、输出和脚本日志。"]
      }
    };

    const detailEl = document.getElementById("detail");
    const nodes = Array.from(document.querySelectorAll(".flow-node"));
    const filters = Array.from(document.querySelectorAll(".filter"));

    function section(title, items) {
      if (!items || !items.length) return "";
      const body = items.map((item) => {
        if (Array.isArray(item)) return `<li><code>${item[0]}</code>：${item[1]}</li>`;
        return `<li>${item}</li>`;
      }).join("");
      return `<div class="section"><h3>${title}</h3><ul>${body}</ul></div>`;
    }

    function render(id) {
      const data = DETAILS[id];
      if (!data) return;
      detailEl.innerHTML = `
        <h2>${data.title}</h2>
        <p class="tagline">${data.summary}</p>
        ${section("规则", data.rules)}
        ${section("参数/工作方式", data.params)}
        ${section("脚本/文档", data.scripts)}
        ${section("常见故障", data.faults)}
        <div class="quick-links">
          <a href="WORKFLOW_DEBUG_FLOWCHART.md">文字版总图</a>
          <a href="COURSEWAREMAKER_AUTOMATION_GUIDE.md">总指南</a>
          <a href="DOCUMENTATION_INDEX.md">文档索引</a>
        </div>
      `;
      nodes.forEach((node) => node.classList.toggle("active", node.dataset.id === id));
    }

    nodes.forEach((node) => {
      node.addEventListener("click", () => render(node.dataset.id));
      node.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") render(node.dataset.id);
      });
      node.setAttribute("tabindex", "0");
      node.setAttribute("role", "button");
    });

    filters.forEach((filter) => {
      filter.addEventListener("click", () => {
        const value = filter.dataset.filter;
        filters.forEach((item) => item.classList.toggle("active", item === filter));
        nodes.forEach((node) => {
          const tags = (node.dataset.tags || "").split(/\s+/);
          node.classList.toggle("hidden", value !== "all" && !tags.includes(value));
        });
      });
    });

    render("intake");
  </script>
</body>
</html>
