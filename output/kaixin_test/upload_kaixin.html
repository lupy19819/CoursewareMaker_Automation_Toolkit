<!DOCTYPE html>
<html><body>
<h3>Uploading config...</h3>
<pre id="log"></pre>
<script>
const LOG = document.getElementById('log');
function log(msg) { LOG.textContent += msg + '\n'; }

(async () => {
  const TOKEN = new URLSearchParams(location.search).get('token');
  const GAME_ID = 'f41152a7-4e14-11f1-b0f5-e648d636fd2c';
  
  log('Fetching config...');
  const cfgResp = await fetch('/kaixin_test.json');
  const cfg = await cfgResp.json();
  log(`Config loaded: ${cfg.game.length} levels`);
  
  log('Getting game meta...');
  const metaResp = await fetch(`https://sszt-gateway.speiyou.com/beibo/game/config/game?game_id=${GAME_ID}`, {
    headers: {'beibotoken': TOKEN, 'Content-Type': 'application/json;charset=UTF-8'}
  });
  const metaData = await metaResp.json();
  if (metaData.code !== 0) { log('Meta FAILED: ' + JSON.stringify(metaData)); return; }
  const meta = metaData.result;
  log(`Game: ${meta.game_name}`);
  
  const payload = {
    game_id: GAME_ID,
    game_name: meta.game_name || '开心游乐园配置测试',
    template_id: meta.template_id || '70a3010b-0b7a-11ef-b3a3-fa7902489df6',
    game_type: meta.game_type || 1,
    configuration: cfg,
    is_experiential_game: meta.is_experiential_game || 0,
    is_level: meta.is_level || 0,
    is_play: meta.is_play || 0,
  };
  ['description','picture','config_category_id','tag','year','term_id',
   'subject_id','grade','cnum_id','settlement_type','platform','skill_tag','knowledge'].forEach(k => {
    if (meta[k]) payload[k] = meta[k];
  });
  
  log(`Uploading (${JSON.stringify(payload).length} bytes)...`);
  const saveResp = await fetch('https://sszt-gateway.speiyou.com/beibo/game/config/game', {
    method: 'PUT',
    headers: {
      'beibotoken': TOKEN,
      'Content-Type': 'application/json;charset=UTF-8'
    },
    body: JSON.stringify(payload)
  });
  
  const result = await saveResp.json();
  log('Result: ' + JSON.stringify(result, null, 2));
  if (result.code === 0) log('✅ SUCCESS! Config uploaded!');
})();
</script>
</body></html>
